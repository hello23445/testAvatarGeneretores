<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>В разработке</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        padding: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
        font-size: 22px;
        margin-bottom: 12px;
        line-height: 1.4;
    }

    p {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 24px;
    }

    button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s ease;
    }

    button:hover {
        background: #2563eb;
        transform: translateY(-2px);
    }

    button:active {
        transform: scale(0.98);
    }

    .icon {
        font-size: 40px;
        margin-bottom: 12px;
    }
</style>
</head>

<body>

<div class="card">
    <div class="icon">🚧</div>
    <h1>Страница находится в разработке</h1>
    <p>Мы уже работаем над этим разделом.<br>Скоро он станет доступен.</p>
    <button onclick="window.history.back()">← Вернуться назад</button>
</div>

<script>
// Telegram WebApp Settings Button
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.SettingsButton.show();
  window.Telegram.WebApp.onEvent('settingsButtonClicked', () => {
    window.location.href = 'settings.html';
  });
}
</script>
</body>
</html>
