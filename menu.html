<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Меню</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
:root{
  --bg1:#020617;
  --bg2:#0f172a;
  --accent:#3b82f6;
  --accent2:#22d3ee;
  --danger:#ef4444;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.65);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 10% 0%, rgba(59,130,246,.35), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(34,211,238,.25), transparent 60%),
    linear-gradient(180deg,var(--bg2),var(--bg1));
  min-height:100vh;
}

.wrapper{
  max-width:480px;
  margin:0 auto;
  padding:16px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}

.title{
  font-size:22px;
  font-weight:700;
  letter-spacing:.3px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.section-title{
  font-size:13px;
  color:var(--muted);
  margin-bottom:10px;
  padding-left:6px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}


.btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:14px 14px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
  transition:.18s ease;
  font-size:15px;
}

.btn:hover{
  background:rgba(255,255,255,0.08);
}

.btn:active{
  transform:scale(.98);
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  box-shadow:0 6px 20px rgba(59,130,246,.35);
}

.btn-center{
  justify-content:center;
}

.btn-danger{
  background:linear-gradient(135deg,#7f1d1d,var(--danger));
  border:none;
}

.btn-yellow{
  background:linear-gradient(135deg,#f59e0b,#f97316);
  border:none;
}

.row{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon{
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.08);
  font-size:14px;
}

.right{
  margin-left:auto;
  opacity:.7;
}

.footer{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}

.hidden{
  display:none !important;
}

.back-center{
display:block;
width:100%;
text-align:center;
text-decoration:none;
color:white;
font-weight:700;
padding:12px 0;
border-radius:12px;
background:linear-gradient(135deg,#7f1d1d,var(--danger));
box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.back-center:active{
transform:scale(.98);
}


.back-title{
text-align:center;
font-weight:700;
}

.back-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
text-decoration:none;
color:white;
font-weight:700;
}


.back-center:active{
transform:scale(.98);
}


</style>
</head>

<body>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
if (localStorage.getItem('enableconfirmation') === 'true') {
  tg.enableClosingConfirmation();
}
tg.SettingsButton.show();
tg.onEvent('settingsButtonClicked', () => {
  window.location.href = 'settings.html';
});

// ADMIN BUTTON
(function(){
const isAdmin = localStorage.getItem('admin') === 'true';
if(isAdmin){
 document.getElementById('sendPhotoBtn').classList.remove('hidden');
}
})();

// UPDATE LINKS
(function(){
function isValidUserID(uid){
if(!uid) return false;
if(uid === 'null') return false;
return /^\d+$/.test(uid);
}

const telegramLink = document.getElementById('telegramLink');
const emailLink = document.getElementById('emailLink');

const uid = localStorage.getItem('userID');
const email = localStorage.getItem('email');

telegramLink.querySelector('div div:last-child').textContent =
 isValidUserID(uid)
 ? 'Изменить Telegram ID'
 : 'Подключить Telegram ID';

emailLink.querySelector('div div:last-child').textContent =
 email
 ? 'Изменить Email'
 : 'Подключить Email';
})();

// LIQUID GLASS EFFECT
(function(){
  const liquidState = localStorage.getItem('liquid');
  if (liquidState === 'Включен') {
    document.body.style.backdropFilter = "blur(20px)";
    
    const style = document.createElement('style');
    style.id = 'liquid-style';
    style.textContent = `
      button, 
      .btn, 
      .back-btn, 
      .back-center,
      .option-item, 
      .liquid-toggle, 
      .switch,
      input, 
      .faq-item summary,
      [role="button"] { 
        border: 1px solid rgba(255,255,255,0.8) !important; 
      }
    `;
    document.head.appendChild(style);
  }
})();
if (!tg || tg === null || tg === undefined || tg === ''){
  const tg = window.Telegram.WebApp;
}
tg.expand();
if (localStorage.getItem('enableconfirmation') === 'true') {
  tg.enableClosingConfirmation();
}
else{
    window.Telegram.WebApp.disableClosingConfirmation();
}

setInterval(() => {
  tg.SettingsButton.show();
  tg.onEvent('settingsButtonClicked', () => {
    window.location.href = 'settings.html';
  });
}, 1000);
</script>
