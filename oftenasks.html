<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Часто задаваемые вопросы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
:root {
    --bg1: #020617;
    --bg2: #0f172a;
    --accent: #3b82f6;
    --accent2: #22d3ee;
    --card-bg: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.6);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    margin: 0;
    padding: 20px;
    font-family: "Segoe UI", Arial, sans-serif;
    color: var(--text);
    background:
        radial-gradient(900px 500px at 20% 0%, rgba(59,130,246,0.35), transparent 60%),
        radial-gradient(900px 500px at 80% 10%, rgba(34,211,238,0.28), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    min-height: 100vh;
    overflow-y: auto;
}

.container {
    max-width: 800px;
    margin: 0 auto;
}

.back-btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin-bottom: 25px;
    text-align: center;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #7f1d1d, #ef4444);
    transition: transform 0.2s;
}
.back-btn:hover { transform: scale(1.02); }

h1 {
    text-align: center;
    margin-bottom: 20px;
}

#search {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 25px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 15px;
}

.faq-item {
    margin-bottom: 12px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    transition: all 0.2s;
    backdrop-filter: blur(6px);
}
.faq-item summary {
    cursor: pointer;
    padding: 14px 18px;
    font-weight: 600;
    list-style: none;
    position: relative;
}
.faq-item summary::marker { content: none; }

.faq-item summary::before {
    content: "\f105"; /* fa-angle-right */
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    display: inline-block;
    margin-right: 12px;
    transition: transform 0.3s;
}
.faq-item[open] summary::before {
    content: "\f107"; /* fa-angle-down */
}

.answer {
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    background: rgba(0,0,0,0.25);
    white-space: pre-wrap;
    word-wrap: break-word;
}

@media (max-width: 600px) {
    body { padding: 12px; }
    #search { padding: 10px; }
    .back-btn { padding: 12px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="container">
    <a href="menu.html" class="back-btn" id="backBtn">← Вернуться назад</a>
    <h1>Часто задаваемые вопросы</h1>
    <input type="text" id="search" placeholder="Поиск по вопросам...">
    <div id="faq-list"></div>
</div>

<script>
const faqData = [
    { question: "Почему фотографии долго генерируются?", answer: `— Бот один, а пользователей много.\nИз-за этого генерация может занимать больше времени.\nБот проверяет соблюдение правил.\nМаксимальный срок генерации — до 2 дней.` },
    { question: "Как купить премиум-подписку?", answer: `Способ 1(Покупка у поддержки):\n1. Купите промокод у поддержки.\n2. Откройте приложение бота(тоесть это приложение).\n3. Подпишитесь на канал(если не подписаны).\n4. На экране генерации нажмите «Premium».\n5. Пролистайте вниз и введите промокод в нужном поле.\n\nСпособ 2(Покупка в самом приложении):\n1. Откройте приложение бота(тоесть это приложение).\n2. Подпишитесь на канал(если не подписаны).\n3. На экране генерации нажмите «Premium».\n4. Пролистайте вниз и выберите нужный вам тариф.` },
    { question: "Как увеличить количество лимитов в день?", answer: `1. Купить промокод на лимиты у поддержки.\n2. Купить премиум (см. инструкцию выше).` },
    { question: "Как получить свой API-ключ?", answer: `1. Главное меню → Мой API-ключ.\n2. Нажмите "Создать мой API-ключ".\n3. Копируйте ключ.` },
    { question: "Как получить лимиты на генерацию?", answer: `1. Введите промокод.\n2. Посмотрите видео-рекламу.\n3. Через службу поддержки.` },
    { question: 'Для чего нужен режим "Удиви меня"?', answer: `Применяет случайное описание и параметры.` },
    { question: "Где можно увидеть цены на Premium?", answer: `Главное меню → Premium → Пролистайте вниз.\nИногда бывают скидки!` },
    { question: "Для чего нужен параметр 'Тип освещения'?", answer: `Определяет, как свет падает на объект и какое настроение создаёт.` },
    { question: 'Для чего нужна авторизация при "Отправить через Telegram бота"?', answer: `Чтобы бот точно отправлял изображения вам.` }
];

function renderFAQ(data) {
    const faqList = document.getElementById('faq-list');
    faqList.innerHTML = '';
    data.forEach(item => {
        const faqItem = document.createElement('details');
        faqItem.className = 'faq-item';
        const summary = document.createElement('summary');
        summary.textContent = item.question;
        const answer = document.createElement('div');
        answer.className = 'answer';
        answer.textContent = item.answer;
        faqItem.appendChild(summary);
        faqItem.appendChild(answer);
        faqList.appendChild(faqItem);
    });
}

renderFAQ(faqData);

document.getElementById('search').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    renderFAQ(faqData.filter(item => item.question.toLowerCase().includes(query)));
});

// iPhone liquid tweak
if (/iPhone/i.test(navigator.userAgent)) {
    if (localStorage.getItem('liquid') === 'Включен') {
        const style = document.createElement('style');
        style.textContent = `button, input[type="button"], input[type="submit"], input[type="reset"], input[type="image"], .btn, [role="button"] { border: 1px solid rgba(255,255,255,0.8) !important; }`;
        document.head.appendChild(style);
        backBtn.style.border = '1px solid rgba(255,255,255,0.8)';
    }
}

// Клик вне поля убирает клавиатуру
document.addEventListener('click', e => {
    if(e.target.id !== 'search') document.getElementById('search').blur();
});
</script>
<script type="module" src="security.js"></script>
</body>
</html>
