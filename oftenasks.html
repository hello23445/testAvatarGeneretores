<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Часто задаваемые вопросы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
:root {
    --bg1: #020617;
    --bg2: #0f172a;
    --accent: #22d3ee;
    --accent2: #3b82f6;
    --danger: #ef4444;
    --card-bg: rgba(255, 255, 255, 0.08);
    --card-border: rgba(255, 255, 255, 0.15);
    --text: #f8fafc;
    --muted: #cbd5e1;
    --radius: 20px;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    padding: 20px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    color: var(--text);
    background:
        radial-gradient(800px 600px at 15% 10%, rgba(34, 211, 238, 0.35), transparent 70%),
        radial-gradient(900px 500px at 85% 25%, rgba(59, 130, 246, 0.32), transparent 70%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    min-height: 100vh;
    overflow-y: auto;
    background-attachment: fixed;
}

.container {
    max-width: 820px;
    margin: 0 auto;
}

/* Современная шапка с кнопкой назад */
.top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    padding: 8px 0;
}

.back-center {
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
    color: white;
    font-weight: 700;
    padding: 12px 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #7f1d1d, var(--danger));
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    transition: all 0.2s ease;
    margin-bottom: 32px;
}

.back-center:active {
    transform: scale(0.98);
}

/* Заголовок */
h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    margin: 0 0 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
}

.header-subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
    opacity: 0.9;
}

/* Поиск с иконкой */
.search-container {
    position: relative;
    margin-bottom: 32px;
}

.search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    z-index: 2;
    pointer-events: none;
}

#search {
    width: 100%;
    padding: 16px 20px 16px 54px;
    border-radius: var(--radius);
    border: 1px solid var(--card-border);
    background: rgba(255, 255, 255, 0.1);
    color: var(--text);
    font-size: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
}

#search:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.2);
    background: rgba(255, 255, 255, 0.15);
}

/* Карточки FAQ — glassmorphism + современный вид */
.faq-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.faq-item {
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    box-shadow: 0 10px 20px -4px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(16px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.faq-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 25px -5px rgba(34, 211, 238, 0.15),
                0 8px 10px -6px rgba(0, 0, 0, 0.2);
}

.faq-item summary {
    cursor: pointer;
    padding: 20px 24px;
    font-weight: 600;
    font-size: 17px;
    display: flex;
    align-items: center;
    list-style: none;
    position: relative;
    user-select: none;
}

.faq-item summary::after {
    content: "\f105";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    font-size: 20px;
    color: var(--accent);
    margin-left: auto;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.faq-item[open] summary::after {
    transform: rotate(90deg);
}

.faq-item[open] {
    box-shadow: 0 15px 30px -6px rgba(34, 211, 238, 0.25);
}

/* Ответ */
.answer {
    padding: 6px 24px 24px;
    font-size: 15.5px;
    line-height: 1.75;
    color: var(--muted);
    background: rgba(0, 0, 0, 0.2);
    white-space: pre-wrap;
    word-wrap: break-word;
}

/* Сообщение "Ничего не найдено" */
.no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 20px -4px rgba(0, 0, 0, 0.2);
}

.no-results i {
    font-size: 52px;
    opacity: 0.25;
    margin-bottom: 16px;
    display: block;
}

.no-results p:first-of-type {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
}

/* Анимация появления ответа */
@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.faq-item[open] .answer {
    animation: fadeInDown 0.3s ease forwards;
}

/* Адаптив */
@media (max-width: 600px) {
    body { padding: 16px 12px; }
    h1 { font-size: 24px; }
    .top-bar { margin-bottom: 24px; }
    .search-container { margin-bottom: 24px; }
    .faq-item summary { padding: 18px 20px; font-size: 16px; }
    .answer { padding: 6px 20px 20px; font-size: 15px; }
}

/* Дополнительный блеск на акцентных элементах */
.accent-glow {
    animation: softGlow 4s ease-in-out infinite alternate;
}

@keyframes softGlow {
    from { text-shadow: 0 0 8px rgba(34, 211, 238, 0.6); }
    to { text-shadow: 0 0 20px rgba(34, 211, 238, 0.9); }
}
</style>
</head>
<body>
<div class="container">
    <!-- Кнопка назад -->
    <a href="menu.html" class="back-center" id="backBtn">
        ← Вернуться назад
    </a>

    <!-- Заголовок с градиентом -->
    <h1>Часто задаваемые вопросы</h1>
    <p class="header-subtitle">Быстрые ответы на всё, что вас интересует</p>

    <!-- Поиск с иконкой -->
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search" placeholder="Поиск по вопросам...">
    </div>

    <!-- Список FAQ -->
    <div id="faq-list" class="faq-list"></div>
</div>

<script>
const faqData = [
    { question: "Почему фотографии долго генерируются?", answer: `— Бот один, а пользователей много.\nИз-за этого генерация может занимать больше времени.\nБот проверяет соблюдение правил.\nМаксимальный срок генерации — до 2 дней.` },
    { question: "Как купить премиум-подписку?", answer: `Способ 1(Покупка у поддержки):\n1. Купите промокод у поддержки.\n2. Откройте приложение бота(тоесть это приложение).\n3. Подпишитесь на канал(если не подписаны).\n4. На экране генерации нажмите «Premium».\n5. Пролистайте вниз и введите промокод в нужном поле.\n\nСпособ 2(Покупка в самом приложении):\n1. Откройте приложение бота(тоесть это приложение).\n2. Подпишитесь на канал(если не подписаны).\n3. На экране генерации нажмите «Premium».\n4. Пролистайте вниз и выберите нужный вам тариф.` },
    { question: "Как увеличить количество лимитов в день?", answer: `1. Купить промокод на лимиты у поддержки.\n2. Купить премиум (см. инструкцию выше).` },
    { question: "Как получить свой API-ключ?", answer: `1. Главное меню → Мой API-ключ.\n2. Нажмите "Создать мой API-ключ".\n3. Копируйте ключ.` },
    { question: "Как получить лимиты на генерацию?", answer: `1. Введите промокод.\n2. Посмотрите видео-рекламу.\n3. Через службу поддержки.` },
    { question: 'Для чего нужен режим "Удиви меня"?', answer: `Применяет случайное описание и параметры.` },
    { question: "Где можно увидеть цены на Premium?", answer: `Главное меню → Premium → Пролистайте вниз.\nИногда бывают скидки!` },
    { question: "Для чего нужен параметр 'Тип освещения'?", answer: `Определяет, как свет падает на объект и какое настроение создаёт.` },
    { question: 'Для чего нужна авторизация при "Отправить через Telegram бота"?', answer: `Чтобы бот точно отправлял изображения вам.` }
];

function renderFAQ(data, isSearch = false) {
    const faqList = document.getElementById('faq-list');
    faqList.innerHTML = '';

    if (data.length === 0 && isSearch) {
        faqList.innerHTML = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <p>Ничего не найдено</p>
                <p>Попробуйте изменить запрос поиска</p>
            </div>`;
        return;
    }

    data.forEach(item => {
        const faqItem = document.createElement('details');
        faqItem.className = 'faq-item';

        const summary = document.createElement('summary');
        summary.textContent = item.question;

        const answer = document.createElement('div');
        answer.className = 'answer';
        answer.textContent = item.answer;

        faqItem.appendChild(summary);
        faqItem.appendChild(answer);
        faqList.appendChild(faqItem);
    });
}

// Первоначальная отрисовка
renderFAQ(faqData);

// Поиск в реальном времени
document.getElementById('search').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const filtered = faqData.filter(item => 
        item.question.toLowerCase().includes(query)
    );
    renderFAQ(filtered, query.length > 0);
});

// iPhone liquid tweak (оставлен без изменений)
if (/iPhone/i.test(navigator.userAgent)) {
    if (localStorage.getItem('liquid') === 'Включен') {
        const style = document.createElement('style');
        style.textContent = `button, input[type="button"], input[type="submit"], input[type="reset"], input[type="image"], .btn, [role="button"] { border: 1px solid rgba(255,255,255,0.8) !important; }`;
        document.head.appendChild(style);
        const backBtn = document.getElementById('backBtn');
        if (backBtn) backBtn.style.border = '1px solid rgba(255,255,255,0.8)';
    }
}

// Закрытие клавиатуры при клике вне поля
document.addEventListener('click', e => {
    if (e.target.id !== 'search') {
        document.getElementById('search').blur();
    }
});
</script>
<script>
// Telegram WebApp Settings Button
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.SettingsButton.show();
  window.Telegram.WebApp.onEvent('settingsButtonClicked', () => {
    window.location.href = 'settings.html';
  });
}
</script>
<script type="module" src="security.js"></script>
</body>
</html>
