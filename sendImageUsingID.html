<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Отправка фото в Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px; /* Увеличен размер шрифта для мобильных */
        }
        #drop-zone {
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
            min-height: 100px; /* Минимальная высота для удобства на мобильных */
        }
        #drop-zone.dragover {
            border-color: #007bff;
            background-color: #e9ecef;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .input-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }
        .input-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 14px;
        }
        .input-buttons button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #fefefe;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-content p {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #333;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .modal-buttons .btn-confirm {
            background-color: #28a745;
            color: white;
        }
        .modal-buttons .btn-cancel {
            background-color: #dc3545;
            color: white;
        }
        /* Оптимизация для мобильных устройств */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            form {
                padding: 15px;
            }
            input, textarea {
                font-size: 14px;
            }
            button {
                font-size: 14px;
            }
            .modal-content {
                width: 95%;
            }
        }
        #full-image {
            cursor: zoom-in;
            touch-action: none; /* Предотвращает зум браузера на мобильных */
            user-select: none; /* Предотвращает выделение */
        }
        /* Специфические стили для модального окна изображения */
        #imageModal .modal-content {
            background: black;
            padding: 0;
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Предотвращает скролл */
        }
        #imageModal button {
            z-index: 10; /* Кнопка поверх изображения */
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        /* Оптимизация для больших экранов */
        @media (min-width: 768px) {
            #imageModal button {
                top: 30px;
                right: 30px;
                padding: 15px 20px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <button onclick="window.location.href='menu.html'">НАЗАД</button>
    <h1>Отправка фото в Telegram</h1>
    <form id="telegram-form">
        <label for="token">Telegram Bot Token:</label>
        <input type="text" id="token" required placeholder="Введите ваш bot token">
        <div id="token-buttons" class="input-buttons"></div>

        <label for="chat_id">ID пользователя (chat_id):</label>
        <input type="text" id="chat_id" required placeholder="Введите ID пользователя">
        <div id="chat_id-buttons" class="input-buttons"></div>

        <label for="channel">@username Telegram канала (для проверки подписки):</label>
        <input type="text" id="channel" placeholder="Введите @username канала (опционально)">
        <div id="channel-buttons" class="input-buttons"></div>

        <label for="caption">Описание фото (caption):</label>
        <textarea id="caption" rows="3" placeholder="Введите описание (опционально)"></textarea>
        <div id="caption-buttons" class="input-buttons"></div>

        <label for="photo">Фото:</label>
        <div id="drop-zone">Перетащите фото сюда или кликните для выбора</div>
        <input type="file" id="photo" accept="image/*" style="display: none;">

        <div id="preview-section" style="display: none; margin-top: 16px;">
            <h2 style="font-size: 24px; margin-bottom: 8px;">Предпросмотр</h2>
            <p style="font-size: 16px; margin-bottom: 16px;">Так будет выглядеть выбранное изображение.</p>
            <img id="preview-image" alt="Предпросмотр фото" style="max-width: 100%; height: auto; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <button type="submit">Отправить фото</button>
    </form>
    <div id="status"></div>

    <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="confirmAction(true)">Продолжить</button>
                <button class="btn-cancel" onclick="confirmAction(false)">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно ошибки -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <p id="errorMessage"></p>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="closeErrorModal()">ОК</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для полноэкранного просмотра фото -->
    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <div class="modal-content" style="background: black; padding: 0; position: relative; max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center;">
            <img id="full-image" style="max-width: 100%; max-height: 100%; display: block; transform-origin: center; transition: transform 0.1s ease;" onclick="event.stopPropagation()">
            <button onclick="closeImageModal(); event.stopPropagation()">Закрыть</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('photo');
        const form = document.getElementById('telegram-form');
        const status = document.getElementById('status');
        const confirmModal = document.getElementById('confirmModal');
        const confirmMessage = document.getElementById('confirmMessage');

        let pendingSubmitData = null;

        // Функции для копирования и вставки
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }

        async function pasteFromClipboard(input) {
            try {
                const text = await navigator.clipboard.readText();
                input.value = text;
            } catch (err) {
                console.error('Failed to paste:', err);
            }
        }

        function updateCopyButton(input, buttonId) {
            const button = document.getElementById(buttonId);
            if (button) {
                button.disabled = !input.value.trim();
            }
        }

        // Обработчики для кнопок при фокусе на инпутах
        const tokenInput = document.getElementById('token');
        const tokenButtons = document.getElementById('token-buttons');

        tokenInput.addEventListener('focus', () => {
            tokenButtons.innerHTML = `
                <button type="button" id="create-nickname-token">Создать никнейм</button>
                <button type="button" id="generate-photo-token">Сгенерировать фото</button>
                <button type="button" id="copy-token">Скопировать</button>
                <button type="button" id="paste-token">Вставить</button>
            `;
            document.getElementById('create-nickname-token').addEventListener('click', () => {
                tokenInput.value = '6537497957:AAGZS4adwPVJSlx16YCCDrKjO96rDK7ZstI';
                updateCopyButton(tokenInput, 'copy-token');
                tokenInput.focus();
            });
            document.getElementById('generate-photo-token').addEventListener('click', () => {
                tokenInput.value = '8110009554:AAHHqWor-TEgbvoi7kdeuW7J4da3M24FJGk';
                updateCopyButton(tokenInput, 'copy-token');
                tokenInput.focus();
            });
            document.getElementById('copy-token').addEventListener('click', () => {
                copyToClipboard(tokenInput.value);
                tokenInput.focus();
            });
            document.getElementById('paste-token').addEventListener('click', () => {
                pasteFromClipboard(tokenInput);
                updateCopyButton(tokenInput, 'copy-token');
                tokenInput.focus();
            });
            updateCopyButton(tokenInput, 'copy-token');
        });

        tokenInput.addEventListener('input', () => {
            updateCopyButton(tokenInput, 'copy-token');
        });

        tokenInput.addEventListener('blur', () => {
            setTimeout(() => {
                if (!tokenButtons.contains(document.activeElement)) {
                    tokenButtons.innerHTML = '';
                }
            }, 100);
        });

        const channelInput = document.getElementById('channel');
        const channelButtons = document.getElementById('channel-buttons');

        channelInput.addEventListener('focus', () => {
            channelButtons.innerHTML = `<button type="button" id="create-nickname-channel">Создать никнейм</button><button type="button" id="copy-channel">Скопировать</button><button type="button" id="paste-channel">Вставить</button>`;
            document.getElementById('create-nickname-channel').addEventListener('click', () => {
                channelInput.value = '@Nicknaymes2bot';
                updateCopyButton(channelInput, 'copy-channel');
                channelInput.focus();
            });
            document.getElementById('copy-channel').addEventListener('click', () => {
                copyToClipboard(channelInput.value);
                channelInput.focus();
            });
            document.getElementById('paste-channel').addEventListener('click', () => {
                pasteFromClipboard(channelInput);
                updateCopyButton(channelInput, 'copy-channel');
                channelInput.focus();
            });
            updateCopyButton(channelInput, 'copy-channel');
        });

        channelInput.addEventListener('input', () => {
            updateCopyButton(channelInput, 'copy-channel');
        });

        channelInput.addEventListener('blur', () => {
            setTimeout(() => {
                if (!channelButtons.contains(document.activeElement)) {
                    channelButtons.innerHTML = '';
                }
            }, 100);
        });

        const chatIdInput = document.getElementById('chat_id');
        const chatIdButtons = document.getElementById('chat_id-buttons');

        chatIdInput.addEventListener('focus', () => {
            chatIdButtons.innerHTML = `
                <button type="button" id="insert-chat-id">6434781065</button>
                <button type="button" id="copy-chat_id">Скопировать</button>
                <button type="button" id="paste-chat_id">Вставить</button>
            `;
            document.getElementById('insert-chat-id').addEventListener('click', () => {
                chatIdInput.value = '6434781065';
                updateCopyButton(chatIdInput, 'copy-chat_id');
                chatIdInput.focus();
            });
            document.getElementById('copy-chat_id').addEventListener('click', () => {
                copyToClipboard(chatIdInput.value);
                chatIdInput.focus();
            });
            document.getElementById('paste-chat_id').addEventListener('click', () => {
                pasteFromClipboard(chatIdInput);
                updateCopyButton(chatIdInput, 'copy-chat_id');
                chatIdInput.focus();
            });
            updateCopyButton(chatIdInput, 'copy-chat_id');
        });

        chatIdInput.addEventListener('input', () => {
            updateCopyButton(chatIdInput, 'copy-chat_id');
        });

        chatIdInput.addEventListener('blur', () => {
            setTimeout(() => {
                if (!chatIdButtons.contains(document.activeElement)) {
                    chatIdButtons.innerHTML = '';
                }
            }, 100);
        });

        const captionInput = document.getElementById('caption');
        const captionButtons = document.getElementById('caption-buttons');

        captionInput.addEventListener('focus', () => {
            captionButtons.innerHTML = `
                <button type="button" id="copy-caption">Скопировать</button>
                <button type="button" id="paste-caption">Вставить</button>
            `;
            document.getElementById('copy-caption').addEventListener('click', () => {
                copyToClipboard(captionInput.value);
                captionInput.focus();
            });
            document.getElementById('paste-caption').addEventListener('click', () => {
                pasteFromClipboard(captionInput);
                updateCopyButton(captionInput, 'copy-caption');
                captionInput.focus();
            });
            updateCopyButton(captionInput, 'copy-caption');
        });

        captionInput.addEventListener('input', () => {
            updateCopyButton(captionInput, 'copy-caption');
        });

        captionInput.addEventListener('blur', () => {
            setTimeout(() => {
                if (!captionButtons.contains(document.activeElement)) {
                    captionButtons.innerHTML = '';
                }
            }, 100);
        });

        // Функция для отображения модального окна подтверждения
        function showConfirmModal(message) {
            return new Promise((resolve) => {
                confirmMessage.textContent = message;
                confirmModal.classList.add('show');
                
                window.confirmAction = function(confirmed) {
                    confirmModal.classList.remove('show');
                    resolve(confirmed);
                };
            });
        }

        // Функция для отображения модального окна ошибки
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');
        
        function closeErrorModal() {
            if (errorModal) {
                errorModal.classList.remove('show');
            }
        }
        
        function showErrorModal(message) {
            if (errorMessage && errorModal) {
                errorMessage.textContent = message;
                errorModal.classList.add('show');
            }
        }

        // Поддержка drag-and-drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            updateDropZoneText();
        });

        fileInput.addEventListener('change', updateDropZoneText);

        function updateDropZoneText() {
            const previewSection = document.getElementById('preview-section');
            const previewImage = document.getElementById('preview-image');
            if (fileInput.files.length > 0) {
                dropZone.textContent = `Выбрано: ${fileInput.files[0].name}`;
                // Показать предпросмотр
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewSection.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                dropZone.textContent = 'Перетащите фото сюда или кликните для выбора';
                previewSection.style.display = 'none';
            }
        }

        // Обработчик клика на превью для полноэкранного просмотра
        document.getElementById('preview-image').addEventListener('click', () => {
            const fullImage = document.getElementById('full-image');
            fullImage.src = document.getElementById('preview-image').src;
            fullImage.onload = () => {
                naturalWidth = fullImage.naturalWidth;
                naturalHeight = fullImage.naturalHeight;
            };
            document.getElementById('imageModal').classList.add('show');
        });

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
            // Сбросить масштаб и позицию при закрытии
            scale = 1;
            translateX = 0;
            translateY = 0;
            document.getElementById('full-image').style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
        }

        // Переменные для зума и панорамирования
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let initialDistance = 0;
        let initialScale = 1;
        let isDragging = false;
        let startX, startY;
        let naturalWidth = 0;
        let naturalHeight = 0;

        function getDistance(touch1, touch2) {
            return Math.sqrt((touch1.clientX - touch2.clientX) ** 2 + (touch1.clientY - touch2.clientY) ** 2);
        }

        function updateTransform() {
            // Ограничить translate, чтобы изображение не выходило за границы экрана
            const maxTranslateX = Math.max(0, (naturalWidth * scale - window.innerWidth) / 2);
            const maxTranslateY = Math.max(0, (naturalHeight * scale - window.innerHeight) / 2);
            translateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, translateX));
            translateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, translateY));
            fullImage.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
        }

        const fullImage = document.getElementById('full-image');

        // Зум двумя пальцами
        fullImage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = getDistance(e.touches[0], e.touches[1]);
                initialScale = scale;
            } else if (e.touches.length === 1 && scale > 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            }
        });

        fullImage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialDistance > 0) {
                e.preventDefault();
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                scale = Math.min(Math.max(initialScale * (currentDistance / initialDistance), 0.5), 3);
                updateTransform();
            } else if (isDragging && e.touches.length === 1) {
                e.preventDefault();
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            }
        });

        fullImage.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDistance = 0;
            }
            if (e.touches.length === 0) {
                isDragging = false;
            }
        });

        // Зум колесом мыши для desktop
        fullImage.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.min(Math.max(scale, 0.5), 3);
            updateTransform();
        });

        // Панорамирование мышью для desktop
        fullImage.addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateTransform();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Закрытие по клавише ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('imageModal').classList.contains('show')) {
                closeImageModal();
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            status.textContent = '';
            status.style.color = '#333';

            const token = document.getElementById('token').value.trim();
            const chat_id = document.getElementById('chat_id').value.trim();
            const channel = document.getElementById('channel').value.trim();
            const caption = document.getElementById('caption').value.trim();
            const photo = fileInput.files[0];

            // Проверки обязательных полей
            if (!token) {
                const logMessage = 'Поле токена бота не может быть пустым';
                status.textContent = logMessage;
                status.style.color = '#dc3545';
                console.log(logMessage);
                return;
            }
            if (!chat_id) {
                const logMessage = 'Поле ввода ID не может быть пустым';
                status.textContent = logMessage;
                status.style.color = '#dc3545';
                console.log(logMessage);
                return;
            }
            if (!photo) {
                const logMessage = 'Вы не выбрали фотографию!';
                status.textContent = logMessage;
                status.style.color = '#dc3545';
                console.log(logMessage);
                showErrorModal(logMessage);
                return;
            }

            // Сбор незаполненных необязательных полей
            const emptyOptionalFields = [];
            if (!channel) emptyOptionalFields.push('«@username Telegram канала»');
            if (!caption) emptyOptionalFields.push('«Описание фото (caption)»');

            // Если есть незаполненные необязательные, показать модальное окно
            if (emptyOptionalFields.length > 0) {
                let message;
                if (emptyOptionalFields.length === 1) {
                    message = `Данное поле ${emptyOptionalFields[0]} не заполнено, продолжить отправку?`;
                } else {
                    message = `Данные поля ${emptyOptionalFields.join(', ')} не заполнены, продолжить?`;
                }
                
                const proceed = await showConfirmModal(message);
                
                if (!proceed) {
                    const logMessage = 'Отправка отменена';
                    status.textContent = logMessage;
                    status.style.color = '#dc3545';
                    console.log(logMessage);
                    return;
                }
            }

            status.textContent = 'Проверка и отправка...';
            status.style.color = '#007bff'; // Синий для отправки

            let isSubscribed = true; // По умолчанию, если канал не указан

            if (channel) {
                try {
                    const checkUrl = `https://api.telegram.org/bot${token}/getChatMember?chat_id=${encodeURIComponent(channel)}&user_id=${encodeURIComponent(chat_id)}`;
                    const checkResponse = await fetch(checkUrl);

                    if (checkResponse.ok) {
                        const checkResult = await checkResponse.json();
                        if (checkResult.ok) {
                            const statusMember = checkResult.result.status;
                            if (!['member', 'creator', 'administrator', 'restricted'].includes(statusMember)) {
                                isSubscribed = false;
                            }
                        } else {
                            isSubscribed = false; // Если ошибка в результате, считаем не подписан
                        }
                    } else {
                        const error = await checkResponse.json();
                        if (error.error_code === 400 && (error.description.includes('chat not found') || error.description.includes('bot') || error.description.includes('not a member'))) {
                            const logMessage = 'Бот не является админом указанного канала';
                            status.textContent = logMessage;
                            console.log(logMessage);
                        } else {
                            status.textContent = `Ошибка проверки подписки: ${error.description || 'Неизвестная ошибка'} (код: ${error.error_code || 'Неизвестный'})`;
                            console.log(`Ошибка проверки подписки: ${error.description || 'Неизвестная ошибка'} (код: ${error.error_code || 'Неизвестный'})`);
                        }
                        status.style.color = '#dc3545';
                        return;
                    }
                } catch (err) {
                    status.textContent = `Ошибка проверки подписки: ${err.message} (код: неизвестный). Возможно, проблема с CORS.`;
                    console.log(`Ошибка проверки подписки: ${err.message} (код: неизвестный). Возможно, проблема с CORS.`);
                    status.style.color = '#dc3545';
                    return;
                }
            }

            if (!isSubscribed) {
                const logMessage = 'Пользователь не подписан на канал';
                status.textContent = logMessage + '.';
                console.log(logMessage);
                status.style.color = '#dc3545';
                return;
            }

            // Если подписан или канал не указан, отправляем фото
            const formData = new FormData();
            formData.append('chat_id', chat_id);
            formData.append('photo', photo);
            if (caption) formData.append('caption', caption);

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const successMessage = 'Отправлено успешно!';
                    status.textContent = successMessage;
                    status.style.color = '#28a745'; // Зеленый для успеха
                    console.log(successMessage);
                } else {
                    const error = await response.json();
                    const errorMessage = `Ошибка: ${error.description || 'Неизвестная ошибка'} (код: ${error.error_code || 'Неизвестный'})`;
                    status.textContent = errorMessage;
                    console.log(errorMessage);
                    status.style.color = '#dc3545'; // Красный для ошибки
                }
            } catch (err) {
                const errorMessage = `Ошибка: ${err.message} (код: неизвестный). Возможно, проблема с CORS. Рекомендуется использовать серверный прокси.`;
                status.textContent = errorMessage;
                console.log(errorMessage);
                status.style.color = '#dc3545'; // Красный для ошибки
            }
        });
    </script>
    <script type="module" src="security.js"></script>
</body>
