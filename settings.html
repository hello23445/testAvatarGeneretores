<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Настройки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
:root {
    --bg: #070E1D; /* Глубокий темно-синий фон */
    --card-bg: #111D32; /* Фон карточек (чуть светлее) */
    --text: #FFFFFF;
    --muted: #8A9BB2; /* Сине-серый для второстепенного текста */
    --separator: #1F304A; /* Цвет разделительной линии */
    --radius: 10px;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    overflow-y: auto;
}

.container {
    max-width: 820px;
    margin: 0 auto;
    padding: 16px 16px 32px;
}

/* Кнопка назад в минималистичном стиле */
.back-center {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text);
    font-size: 17px;
    margin-bottom: 24px;
    opacity: 0.9;
}

.back-center:active {
    opacity: 0.5;
}

/* Заголовок в стиле подзаголовка секции (как на фото) */
h1 {
    font-size: 13px;
    font-weight: 400;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px 16px;
    letter-spacing: 0.5px;
}

/* Скрываем лишние текстовые элементы секции, чтобы соответствовать чистому виду фото */
.settings-section h2, 
.settings-section p {
    display: none;
}

/* Карточка настроек */
.settings-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 0;
    overflow: hidden;
}

/* Опции интерфейса */
.liquid-toggle {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: transparent;
    position: relative;
}

/* Разделительная линия между пунктами */
.liquid-toggle:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 56px; /* Начинается после иконки */
    right: 0;
    height: 1px;
    background: var(--separator);
}

/* Иконки в стиле фото (квадратные со скруглением) */
.icon-wrapper {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 14px;
    flex-shrink: 0;
    color: #FFFFFF;
    font-size: 14px;
}

.icon-blue { background: #0A84FF; }
.icon-orange { background: #FF9F0A; }

.liquid-toggle .label {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 2px 0;
}

.liquid-toggle .label h3 {
    font-size: 17px;
    font-weight: 400;
    margin: 0;
    color: var(--text);
}

.liquid-toggle .label small {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.3;
    margin-top: 2px;
}

@media (max-width: 600px) {
    .liquid-toggle .label small {
        font-size: 10px;
    }
}

/* Переключатель в стиле iOS/Telegram */
.switch {
    width: 51px;
    height: 31px;
    background: #1F304A; /* Неактивный переключатель под цвет темы */
    border-radius: 31px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
    margin-left: 10px;
}

.switch::after {
    content: "";
    position: absolute;
    width: 27px;
    height: 27px;
    background: #FFFFFF;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.16), 0 3px 1px rgba(0,0,0,0.1);
}

.switch.active {
    background: #0A84FF; /* Активный переключатель синий */
}

.switch.active::after {
    transform: translateX(20px);
}
a:hover{
    cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
    <a onclick="window.history.back()" class="back-center">
        <i class="fa-solid fa-arrow-left"></i> Вернуться назад
    </a>

    <h1>Настройки</h1>

    <div class="settings-card">
        <div class="settings-section">
            <h2>Интерфейс</h2>
            <p>Выберите режим отображения приложения</p>

            <div class="liquid-toggle" id="fullscreen-toggle">
                <div class="icon-wrapper icon-blue">
                    <i class="fa-solid fa-expand"></i>
                </div>
                <div class="label">
                    <h3>Полноэкранный режим</h3>
                    <small>Делает приложение на всю ширину экрана вашего устройства.</small>
                </div>
                <div id="fullscreenSwitch" class="switch"></div>
            </div>

            <div id="liquid-section" class="liquid-toggle" style="display: none;">
                <div class="icon-wrapper icon-orange">
                    <i class="fa-solid fa-droplet"></i>
                </div>
                <div class="label">
                    <h3>Liquid Glass</h3>
                </div>
                <div id="liquidSwitch" class="switch"></div>
            </div>
        </div>
    </div>

</div>

<script>
const tg = window.Telegram.WebApp || {};

// Готовим WebApp
tg.ready();
tg.expand();
tg.SettingsButton.hide();

// ==================== FULLSCREEN ====================
function applyFullscreen(enabled) {
    if (!tg.requestFullscreen || !tg.exitFullscreen) return;

    if (enabled) {
        tg.requestFullscreen();
    } else {
        tg.exitFullscreen();
    }
}

function saveAndApplyFullscreen(enabled) {
    localStorage.setItem('fullscreenEnabled', enabled);
    applyFullscreen(enabled);
}

// ==================== LIQUID GLASS ====================
const isIPhone = /iPhone/i.test(navigator.userAgent);
const liquidSection = document.getElementById('liquid-section');
const liquidSwitch = document.getElementById('liquidSwitch');

function applyLiquid(enabled) {
    if (enabled) {
        // Размытие фона всего body
        document.body.style.backdropFilter = "blur(20px)";

        // Усиленные стеклянные границы (адаптировано под синий стиль)
        if (!document.getElementById('liquid-style')) {
            const style = document.createElement('style');
            style.id = 'liquid-style';
            style.textContent = `
                button, 
                .btn, 
                .back-center, 
                .settings-card,
                .liquid-toggle, 
                .switch,
                input, 
                [role="button"] { 
                    border: 1px solid rgba(255,255,255,0.15) !important; 
                }
            `;
            document.head.appendChild(style);
        }
    } else {
        document.body.style.backdropFilter = "";
        const style = document.getElementById('liquid-style');
        if (style) style.remove();
    }
}

// Основная инициализация
function initSettings() {
    // === Fullscreen Toggle ===
    const fullscreenSwitch = document.getElementById('fullscreenSwitch');
    let fullscreenEnabled = localStorage.getItem('fullscreenEnabled') === 'true';
    if (fullscreenEnabled) {
        fullscreenSwitch.classList.add('active');
    }
    applyFullscreen(fullscreenEnabled);

    fullscreenSwitch.addEventListener('click', () => {
        fullscreenEnabled = !fullscreenEnabled;
        localStorage.setItem('fullscreenEnabled', fullscreenEnabled);
        fullscreenSwitch.classList.toggle('active');
        applyFullscreen(fullscreenEnabled);
    });

    // === Liquid Glass (только iPhone) ===
    if (isIPhone) {
        liquidSection.style.display = 'flex';

        let state = localStorage.getItem('liquid');
        if (!state) {
            localStorage.setItem('liquid', 'Включен');
            state = 'Включен';
        }

        const enabled = state === 'Включен';
        if (enabled) liquidSwitch.classList.add('active');

        applyLiquid(enabled);

        // Переключатель
        liquidSwitch.addEventListener('click', () => {
            const currentEnabled = localStorage.getItem('liquid') === 'Включен';
            const nextEnabled = !currentEnabled;
            showLiquidConfirmModal(nextEnabled);
        });
    }
}

function showLiquidConfirmModal(enabled) {
    const modal = document.getElementById('liquidConfirmModal');
    const icon = modal.querySelector('.modal-icon i');
    const title = modal.querySelector('h2');
    const message = modal.querySelector('p');
    const button = modal.querySelector('.btn--primary');
    
    if (enabled) {
        icon.className = 'fa-solid fa-droplet';
        title.textContent = 'Подтвердите действие';
        message.textContent = 'При включении Liquid Glass приложение необходимо перезапустить!';
        button.textContent = 'Включить и перезапустить';
    } else {
        icon.className = 'fa-solid fa-droplet-slash';
        title.textContent = 'Подтвердите действие';
        message.textContent = 'При выключении Liquid Glass приложение необходимо перезапустить!';
        button.textContent = 'Выключить и перезапустить';
    }
    
    modal.pendingEnabled = enabled;
    modal.style.display = 'flex';
}

function confirmLiquidEnable() {
    const modal = document.getElementById('liquidConfirmModal');
    if (modal && modal.pendingEnabled !== undefined) {
        const enabled = modal.pendingEnabled;
        localStorage.setItem('liquid', enabled ? 'Включен' : 'Выключен');
        liquidSwitch.classList.toggle('active', enabled);
        applyLiquid(enabled);
        modal.style.display = 'none';
        delete modal.pendingEnabled;
        // Перезагрузка страницы
        setTimeout(() => {
            window.location.reload();
        }, 500);
    }
}

function cancelLiquidEnable() {
    const modal = document.getElementById('liquidConfirmModal');
    if (modal) {
        modal.style.display = 'none';
        delete modal.pendingEnabled;
    }
}

// Запуск
document.addEventListener('DOMContentLoaded', initSettings);
</script>

<!-- Liquid Glass Confirmation Modal -->
<div id="liquidConfirmModal" class="modal" style="display: none;">
  <div class="modal-content">
    <div class="modal-icon">
      <i class="fa-solid fa-droplet"></i>
    </div>
    <h2>Подтвердите действие</h2>
    <p>При включении Liquid Glass приложение необходимо перезапустить!</p>
    <div class="modal-buttons">
      <button class="btn btn--primary" onclick="confirmLiquidEnable()">Включить и перезапустить</button>
      <button class="btn btn--secondary" onclick="cancelLiquidEnable()">Отмена</button>
    </div>
  </div>
</div>
  </div>
</div>
<script type="module" src="security.js"></script>
</body>
</html>
