<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>История генераций</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="color-scheme" content="light dark" />
  <style>
    :root {
      --bg: #f2f2f7;
      --bg-1: #f5f5fa;
      --bg-2: #ebebf5;
      --surface: #ffffff;
      --text: #1c1c1e;
      --text-dim: #8e8e93;
      --accent: #007aff;
      --danger: #ff3b30;
      --border: #e5e5ea;
      --shadow: 0 4px 14px rgba(0,0,0,0.05);
      --radius-lg: 20px;
      --radius-md: 12px;
      --gap: 12px;
      --panel-bg:
        radial-gradient(900px 500px at 20% 0%, rgba(0,122,255,0.08), transparent 60%),
        radial-gradient(900px 500px at 80% 10%, rgba(0,122,255,0.06), transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg-1: #060a18;
        --bg-2: #08122a;
        --surface: #1c1c1e;
        --text: #f2f2f7;
        --text-dim: #98989d;
        --border: #38383a;
        --shadow: 0 4px 14px rgba(0,0,0,0.4);
        --panel-bg:
          radial-gradient(900px 500px at 20% 0%, rgba(59,130,246,0.35), transparent 60%),
          radial-gradient(900px 500px at 80% 10%, rgba(34,211,238,0.28), transparent 60%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      background: var(--panel-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page { width: min(800px, 100%); }

    .header {
      text-align: left;
      margin-bottom: 24px;
      padding-top: 10px;
    }

    .title {
      margin: 0 0 8px 0;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
    }

    .sub { 
      margin: 0; 
      color: var(--text-dim); 
      font-size: 15px; 
    }

    .actions {
      display: flex;
      gap: var(--gap);
      margin-bottom: 24px;
    }

    .btn {
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 20px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      flex: 1;
      transition: all 0.2s ease;
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
    }

    .btn:active { transform: scale(0.97); opacity: 0.8; }
    
    .btn--neutral {
      background: var(--accent);
      color: #fff;
    }

    .btn--danger {
      color: var(--danger);
    }

    .filters {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: grid;
      gap: 16px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    
    .filter-label { 
      font-size: 12px; 
      font-weight: 500;
      color: var(--text-dim); 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .input:focus, select:focus {
      border-color: var(--accent);
    }

    .date-filters, .keyword-filter { display: none; }
    .date-filters[data-visible="true"] { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    .keyword-filter[data-visible="true"] { display: block; }

    .stats { margin-bottom: 20px; }
    
    .stat {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stat .k { font-size: 15px; font-weight: 500; }
    .stat .v { font-weight: 700; font-size: 16px; color: var(--accent); }

    .list { 
      display: grid; 
      gap: 16px; 
      margin: 0; 
      padding: 0; 
      list-style: none; 
    }

    .card { 
      background: var(--surface); 
      border-radius: var(--radius-lg); 
      padding: 20px; 
      box-shadow: var(--shadow); 
      display: flex;
      flex-direction: column;
      gap: 16px; 
    }

    .card .row { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start;
      gap: 12px;
    }

    .desc { 
      font-size: 15px; 
      line-height: 1.5; 
      color: var(--text);
      word-break: break-word; 
    }

    .pill { 
      background: var(--bg); 
      color: var(--text-dim); 
      padding: 6px 12px; 
      border-radius: 20px; 
      font-size: 12px; 
      font-weight: 600;
      white-space: nowrap; 
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .card .btn {
      padding: 10px 16px;
      font-size: 14px;
      box-shadow: none;
      background: var(--bg);
      flex: 0 1 auto;
    }

    .card .btn--neutral {
      background: rgba(0, 122, 255, 0.1);
      color: var(--accent);
    }

    .empty, .noresults {
      text-align: center;
      padding: 40px 20px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .empty h3, .noresults h3 { 
      margin: 0 0 8px 0; 
      font-size: 20px; 
    }

    .empty p, .noresults p { 
      margin: 0 0 20px 0; 
      color: var(--text-dim); 
      font-size: 15px; 
    }

    .modal, .confirm { 
      position: fixed; 
      inset: 0; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      background: transparent; 
      backdrop-filter: none;
      z-index: 1000; 
      padding: 0;
    }

    .confirm { 
      align-items: center; 
      background: rgba(0,0,0,0.6); 
      backdrop-filter: blur(4px);
    }

    .modal[aria-hidden="false"], .confirm[aria-hidden="false"] { 
      display: flex; 
      animation: fadeIn 0.2s ease-out;
    }

    .sheet { 
      width: min(500px, 100%); 
      max-height: 85vh; 
      background: var(--surface); 
      color: var(--text); 
      border-radius: 24px; 
      padding: 24px; 
      display: flex;
      flex-direction: column;
      gap: 16px; 
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }

    .modal .sheet {
      width: 100%;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      animation: none;
    }

    @media (max-width: 600px) {
      .sheet {
        max-height: 95vh;
        width: calc(100% - 24px);
      }
      .modal .sheet {
        width: 100%;
        max-height: 100vh;
      }
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet h2 { 
      margin: 0; 
      font-size: 22px; 
      font-weight: 700; 
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail { 
      font-size: 14px; 
      padding: 12px 16px; 
      border-radius: var(--radius-md); 
      background: var(--bg); 
      color: var(--text);
      word-break: break-word; 
    }

    .sheet .bar { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      margin-top: 8px;
    }

    .confirm .sheet {
      align-items: center;
      text-align: center;
      padding: 32px 24px;
    }

    .confirm .bar {
      width: 100%;
      flex-direction: row;
    }
  </style>
</head>
<body>
  <main class="page" id="app" aria-live="polite">
    <header class="header">
      <center>
        <h1 class="title">История генераций</h1>
        <p class="sub">Ваши сохраненные параметры и настройки</p>
      </center>
    </header>

    <section class="actions" aria-label="Действия">
      <button class="btn btn--neutral" id="backBtn" type="button">В меню</button>
      <button class="btn btn--danger" id="clearBtn" type="button">Удалить всё</button>
    </section>

    <section class="filters" aria-label="Фильтры и сортировка">
      <div class="filter-row">
        <div class="filter-group">
          <label class="filter-label" for="sort">Сортировка</label>
          <select id="sort" aria-label="Сортировка">
            <option value="date_desc">Новые сначала</option>
            <option value="date_asc">Старые сначала</option>
            <option value="date_custom">Выбрать даты</option>
            <option value="length_desc">Длинные сначала</option>
            <option value="length_asc">Короткие сначала</option>
            <option value="alpha_asc">А-Я</option>
            <option value="alpha_desc">Я-А</option>
            <option value="keyword">По слову</option>
            <option value="today">Сегодня</option>
            <option value="yesterday">Вчера</option>
            <option value="day_before_yesterday">Позавчера</option>
            <option value="last_month">В прошлом месяце</option>
            <option value="last_year">В прошлом году</option>
            <option value="this_year">В этом году (2026)</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label" for="search">Поиск</label>
          <input class="input" id="search" type="search" placeholder="Поиск..." aria-label="Поиск по истории" autocomplete="off" />
        </div>
      </div>

      <div class="date-filters" id="dateFilters" data-visible="false">
        <div class="filter-group">
          <label class="filter-label" for="dateFrom">От</label>
          <input class="input" id="dateFrom" type="date" />
        </div>
        <div class="filter-group">
          <label class="filter-label" for="dateTo">До</label>
          <input class="input" id="dateTo" type="date" />
        </div>
      </div>

      <div class="keyword-filter" id="keywordFilter" data-visible="false">
        <div class="filter-group">
          <label class="filter-label" for="keywordInput">Ключевое слово</label>
          <input class="input" id="keywordInput" type="text" placeholder="Введите слово..." autocomplete="off" />
        </div>
      </div>
    </section>

    <section class="stats" aria-label="Статистика">
      <div class="stat">
        <div class="k">Занято слотов</div>
        <div class="v"><span id="usedCount">0</span> / <span id="maxCount">0</span></div>
      </div>
    </section>

    <ul class="list" id="list" role="list"></ul>

    <section class="noresults" id="noResults" hidden>
      <h3 id="noResultsTitle">Ничего не найдено</h3>
      <p id="noResultsText"></p>
    </section>

    <section class="empty" id="empty" hidden>
      <h3>Тут пусто</h3>
      <p>Начните генерировать своё первое фото прямо сейчас.</p>
      <button class="btn btn--neutral" id="goBtn" type="button">Перейти к генератору</button>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="sheet" role="document">
      <h2 id="modalTitle">Подробности параметров</h2>
      <div id="details" class="details"></div>
      <div class="bar">
        <button class="btn btn--neutral" id="applyBtn" type="button">Применить параметры</button>
        <button class="btn" id="closeModal" type="button">Закрыть</button>
      </div>
    </div>
  </div>

  <div class="confirm" id="confirm" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="sheet" role="document">
      <h2 id="confirmTitle">Подтвердите действие</h2>
      <p id="confirmText"></p>
      <div class="bar">
        <button class="btn btn--neutral" id="confirmYes" type="button">Да</button>
        <button class="btn" id="confirmNo" type="button">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    const keysTranslation = {
      "text": "1. Текст", "autoTextStyle": "2. Авто стилизация", "autoTextPosition": "3. Авто позиция",
      "description": "4. Описание", "exclusions": "5. Исключения", "quality": "6. Качество",
      "sizeInput": "7. Размер", "style": "8. Стиль", "color-tone": "9. Цвет",
      "detail-level": "10. Детализация", "photo_theme": "11. Тема", "razmitiyPHON": "12. Размытый фон",
      "soot": "13. Соотношение", "ram": "14. Рамка", "rakurs": "15. Ракурс",
      "selector": "16. ИИ", "osvecheniye": "17. Освещение"
    };
    
    let currentIndex = null;
    let confirmCallback = null;
    let cache = { items: [], filtered: [] };

    const $ = (s, r = document) => r.querySelector(s);
    const list = $('#list'), empty = $('#empty'), noResults = $('#noResults');
    const noResultsTitle = $('#noResultsTitle'), noResultsText = $('#noResultsText');
    const usedCount = $('#usedCount'), maxCount = $('#maxCount');
    const modal = $('#modal'), confirmBox = $('#confirm'), detailsBox = $('#details');
    const search = $('#search'), dateFrom = $('#dateFrom'), dateTo = $('#dateTo');
    const sortSelect = $('#sort'), dateFilters = $('#dateFilters');
    const keywordFilter = $('#keywordFilter'), keywordInput = $('#keywordInput');
    const clearBtn = $('#clearBtn'), filtersSection = $('.filters'), statsSection = $('.stats');

    const isPremium = () => localStorage.getItem('premium') === 'true';
    const maxSlots = () => (isPremium() ? 20 : 10);

    function trapFocus(container, onClose) {
      const focusable = container.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      function handle(e) {
        if (e.key === 'Escape') { onClose(); }
        if (e.key !== 'Tab') return;
        if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
        else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
      }
      container.addEventListener('keydown', handle);
      first.focus();
      return () => container.removeEventListener('keydown', handle);
    }

    function openLayer(el) {
      el.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      return trapFocus(el, () => closeLayer(el));
    }
    
    function closeLayer(el) {
      el.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function formatValue(value) {
      if (typeof value === 'boolean') return value ? 'Включен' : 'Выключен';
      return String(value);
    }

    function setDateFiltersVisible(v) {
      dateFilters.setAttribute('data-visible', v ? 'true' : 'false');
      if (!v) { dateFrom.value = ''; dateTo.value = ''; }
    }
    
    function setKeywordVisible(v) {
      keywordFilter.setAttribute('data-visible', v ? 'true' : 'false');
      if (!v) keywordInput.value = '';
    }

    function toggleControlsForZeroSlots(isZeroAndNoSearch) {
      if (isZeroAndNoSearch) {
        filtersSection.style.display = 'none';
        statsSection.style.display = 'none';
        clearBtn.style.display = 'none';
        list.style.display = 'none';
        noResults.hidden = true;
        empty.hidden = false;
      } else {
        filtersSection.style.display = '';
        statsSection.style.display = '';
        clearBtn.style.display = '';
        list.style.display = '';
      }
    }

    function renderStats() {
      usedCount.textContent = cache.items.length;
      maxCount.textContent = maxSlots();
    }

    function renderList(items, { allowEmptyScreen } = { allowEmptyScreen: false }) {
      list.innerHTML = '';
      noResults.hidden = true;
      if (!items.length) {
        empty.hidden = !allowEmptyScreen;
        return;
      }
      empty.hidden = true;
      const frag = document.createDocumentFragment();
      items.forEach(({ index, description, createdAt }) => {
        const li = document.createElement('li');
        li.className = 'card';
        li.role = 'listitem';
        li.dataset.index = index;
        const date = new Date(createdAt);
        const formattedDate = `${date.getDate().toString().padStart(2, '0')}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getFullYear()}`;
        li.innerHTML = `
          <div class="row">
            <div class="desc">${escapeHtml(description)}</div>
            <span class="pill">${formattedDate}</span>
          </div>
          <div class="card-actions">
            <button class="btn" data-act="details">Подробнее</button>
            <button class="btn btn--neutral" data-act="apply">Применить</button>
          </div>
        `;
        frag.appendChild(li);
      });
      list.appendChild(frag);
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function loadHistory() {
      const max = maxSlots();
      const items = [];
      for (let i = 1; i <= max; i++) {
        const raw = localStorage.getItem(`saveDatas${i}`);
        if (!raw) continue;
        try {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.description) {
            if (!parsed.createdAt) {
              parsed.createdAt = new Date().toISOString();
              localStorage.setItem(`saveDatas${i}`, JSON.stringify(parsed));
            }
            items.push({ index: i, raw, data: parsed, description: parsed.description, createdAt: parsed.createdAt });
          }
        } catch (e) {}
      }
      cache.items = items;
      applyFiltersAndSort();
    }

    function applyFiltersAndSort() {
      let filtered = cache.items.slice();
      const q = search.value.trim().toLowerCase();
      const isSearching = q.length > 0;

      if (isSearching) {
        filtered = filtered.filter(x => String(x.description).toLowerCase().includes(q));
      }

      const sortVal = sortSelect.value;
      setDateFiltersVisible(sortVal === 'date_custom');
      setKeywordVisible(sortVal === 'keyword');

      if (sortVal === 'date_custom') {
        const from = dateFrom.value ? new Date(dateFrom.value) : null;
        const to = dateTo.value ? new Date(dateTo.value) : null;
        if (from || to) {
          filtered = filtered.filter(x => {
            const d = new Date(x.createdAt);
            if (from && d < from) return false;
            if (to && d > to) return false;
            return true;
          });
        }
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      if (sortVal === 'keyword') {
        const kw = keywordInput.value.trim().toLowerCase();
        if (kw) {
          filtered = filtered.filter(x =>
            (x.description && String(x.description).toLowerCase().includes(kw)) ||
            (x.data && x.data.text && String(x.data.text).toLowerCase().includes(kw))
          );
        }
      }

      // Helper functions for date filtering
      function isSameDay(date1, date2) {
        return date1.getFullYear() === date2.getFullYear() &&
               date1.getMonth() === date2.getMonth() &&
               date1.getDate() === date2.getDate();
      }

      function isToday(date) {
        return isSameDay(date, new Date());
      }

      function isYesterday(date) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        return isSameDay(date, yesterday);
      }

      function isDayBeforeYesterday(date) {
        const dayBefore = new Date();
        dayBefore.setDate(dayBefore.getDate() - 2);
        return isSameDay(date, dayBefore);
      }

      function isLastMonth(date) {
        const now = new Date();
        const lastMonth = now.getMonth() - 1;
        const year = lastMonth < 0 ? now.getFullYear() - 1 : now.getFullYear();
        const month = lastMonth < 0 ? 11 : lastMonth;
        return date.getFullYear() === year && date.getMonth() === month;
      }

      function isLastYear(date) {
        const now = new Date();
        return date.getFullYear() === now.getFullYear() - 1;
      }

      function isThisYear(date) {
        const now = new Date();
        return date.getFullYear() === now.getFullYear();
      }

      // Apply date filters
      if (sortVal === 'today') {
        filtered = filtered.filter(x => isToday(new Date(x.createdAt)));
      } else if (sortVal === 'yesterday') {
        filtered = filtered.filter(x => isYesterday(new Date(x.createdAt)));
      } else if (sortVal === 'day_before_yesterday') {
        filtered = filtered.filter(x => isDayBeforeYesterday(new Date(x.createdAt)));
      } else if (sortVal === 'last_month') {
        filtered = filtered.filter(x => isLastMonth(new Date(x.createdAt)));
      } else if (sortVal === 'last_year') {
        filtered = filtered.filter(x => isLastYear(new Date(x.createdAt)));
      } else if (sortVal === 'this_year') {
        filtered = filtered.filter(x => isThisYear(new Date(x.createdAt)));
      }

      if (sortVal === 'date_desc') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      else if (sortVal === 'date_asc') filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      else if (sortVal === 'length_desc') filtered.sort((a, b) => b.description.length - a.description.length);
      else if (sortVal === 'length_asc') filtered.sort((a, b) => a.description.length - b.description.length);
      else if (sortVal === 'alpha_asc') filtered.sort((a, b) => a.description.localeCompare(b.description, 'ru'));
      else if (sortVal === 'alpha_desc') filtered.sort((a, b) => b.description.localeCompare(a.description, 'ru'));
      else if (['today', 'yesterday', 'day_before_yesterday', 'last_month', 'last_year', 'this_year'].includes(sortVal)) {
        // For date filters, sort by date descending
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      cache.filtered = filtered;
      renderStats();

      const totalSlots = cache.items.length;
      const zeroSlotsNoSearch = totalSlots === 0 && !isSearching;
      toggleControlsForZeroSlots(zeroSlotsNoSearch);

      if (isSearching && filtered.length === 0) {
        noResults.hidden = false;
        noResultsTitle.textContent = 'Ничего не найдено';
        noResultsText.textContent = `По запросу "${search.value}" ничего не найдено.`;
      } else {
        noResults.hidden = true;
      }

      renderList(cache.filtered, { allowEmptyScreen: zeroSlotsNoSearch });
    }

    function showDetails(slot) {
      currentIndex = slot;
      detailsBox.innerHTML = '';
      const raw = localStorage.getItem(`saveDatas${slot}`);
      if (!raw) return;
      let parsed = {};
      try { parsed = JSON.parse(raw); } catch {}
      const frag = document.createDocumentFragment();
      Object.keys(parsed).forEach(k => {
        if (k === 'sizeSelect' || k === 'createdAt') return;
        const p = document.createElement('div');
        p.className = 'detail';
        p.textContent = `${(keysTranslation[k] || k)}: ${formatValue(parsed[k])}`;
        frag.appendChild(p);
      });
      detailsBox.appendChild(frag);
      openLayer(modal);
    }

    function applyParameters(slot) {
      const raw = localStorage.getItem(`saveDatas${slot}`);
      if (!raw) return;
      localStorage.setItem('savedDatasToLoad', raw);
      window.location.href = 'index.html';
    }

    function askConfirm(actionText, cb) {
      $('#confirmText').textContent = actionText;
      confirmCallback = cb;
      openLayer(confirmBox);
    }

    function clearHistory() {
      const max = maxSlots();
      for (let i = 1; i <= max; i++) localStorage.removeItem(`saveDatas${i}`);
      loadHistory();
    }

    list.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;
      const card = e.target.closest('.card');
      const slot = Number(card?.dataset.index);
      if (!slot) return;
      const act = btn.dataset.act;
      if (act === 'details') showDetails(slot);
      if (act === 'apply') askConfirm('Применить сохранённые параметры?', () => applyParameters(slot));
    });
    
    $('#closeModal').addEventListener('click', () => closeLayer(modal));
    $('#applyBtn').addEventListener('click', () => askConfirm('Применить эти параметры?', () => applyParameters(currentIndex)));
    modal.addEventListener('click', (e) => { if (e.target === modal) closeLayer(modal); });
    $('#confirmYes').addEventListener('click', () => { if (confirmCallback) confirmCallback(); closeLayer(confirmBox); });
    $('#confirmNo').addEventListener('click', () => closeLayer(confirmBox));
    confirmBox.addEventListener('click', (e) => { if (e.target === confirmBox) closeLayer(confirmBox); });
    $('#backBtn').addEventListener('click', () => { window.location.href = 'menu.html'; });
    $('#goBtn')?.addEventListener('click', () => { window.location.href = 'index.html'; });
    $('#clearBtn').addEventListener('click', () => askConfirm('Удалить всю историю?', clearHistory));

    let tId;
    [search, dateFrom, dateTo, keywordInput].forEach(el => {
      el.addEventListener('input', () => {
        clearTimeout(tId);
        tId = setTimeout(applyFiltersAndSort, 120);
      });
    });

    sortSelect.addEventListener('change', applyFiltersAndSort);

    document.addEventListener('click', (event) => {
      const target = event.target;
      if (!target.closest('input') && !target.closest('textarea') && !target.closest('select') && !target.closest('button') && !target.isContentEditable) {
        if (document.activeElement && typeof document.activeElement.blur === 'function') {
          document.activeElement.blur();
        }
      }
    });

    const WebApp = window.Telegram?.WebApp;
    if (WebApp) {
      WebApp.ready();
      WebApp.expand();
      WebApp.enableClosingConfirmation();
      WebApp.SettingsButton.show();
      WebApp.onEvent('settingsButtonClicked', () => {
        window.location.href = 'settings.html';
      });
    }

    document.addEventListener('DOMContentLoaded', loadHistory);
// iPhone liquid border tweak (оставлено)
if (/iPhone/i.test(navigator.userAgent)) {
  if (localStorage.getItem('liquid') === 'Включен') {
    const style = document.createElement('style');
    style.textContent = `
      button, .btn, .btn btn--danger, .btn--neutral {
        border: 1px solid rgba(255, 255, 255, 0.8) !important;
      }
    `;
    document.head.appendChild(style);
  }
}
  </script>
  <script type="module" src="security.js"></script>
</body>
